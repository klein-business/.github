name: Feature Request
description: Suggest a new feature or improvement.
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Describe what you need and why. Focus on the problem, not a specific solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What is the current limitation?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: How should this work? Include examples, mockups, or references if helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider? Why were they rejected?
    validations:
      required: false
